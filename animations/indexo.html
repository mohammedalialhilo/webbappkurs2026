<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation 2</title>
    <style>
        .box {
            position: relative;
            top: 0;
            left: 0;
            height: 200px;
            width: 200px;
            background-color: tomato;
            border: solid 2px saddlebrown;
            animation: bob 5s ease-in-out alternate forwards;

        }

        @keyframes bob {
            25% {
                top: 0;
                left: 300px;
                background-color: slateblue;
                border-radius: 50% 0 0 0;
            }

            50% {
                top: 300px;
                left: 300px;
                background-color: chartreuse;
                border-radius: 50% 50% 0 0;

            }

            75% {
                top: 300px;
                left: 0;
                background-color: aqua;
                border-radius: 50% 50% 50% 0;
            }

            100% {
                top: 0;
                left: 0;
                background-color: purple;
                border-radius: 50% 50% 50% 0;
            }
        }
    </style>
</head>

<body>
    <div class="box">

    </div>
</body>

</html>
