<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transas</title>
    <style>
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vh;

        }

        .box {
            height: 200px;
            width: 200px;
            background-color: aqua;
            border: solid 3px black;
            transition: all 1s ease-in-out;
        }

        .box:hover {
            background-color: brown;
            border-radius: 50%;
            height: 900px;
            width: 100px;
        }
    </style>
</head>

<body>
    <main>
        <div class="box"></div>
    </main>
</body>

</html>
